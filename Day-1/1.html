<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">   <!--utf-unicode transformation format-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Hello World</h1>
    <ul>
        <li>tea</li>
        <li>coffee</li>
        <li>milk</li>
    </ul>
    <!--ordered list is created using <ol> tag instead of <ul> tag -->
    <ol></ol>
        <li>tea</li>
        <li>coffee</li>
        <li>milk</li>
    </ol>
    <!--nested list-->
    <ul>
    <li>tea
        <ul>
            <li>green tea</li>
            <li>black tea</li>
        </ul>
    </li>
    <li>coffee
        <ul>
            <li>espresso</li>
            <li>latte</li>
        </ul>
    </li>
    <li>milk</li>
</body>
</html>
