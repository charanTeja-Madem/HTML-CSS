<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>complex tables</title>
</head>
<body>
    <!--tables with row span-->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>subject</th>
                <th>marks</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="2">1</td>
                <td rowspan="2">charan</td>
                <td>Maths</td>
                <td>85</td>
            </tr>
            <tr>
                <td>Science</td>
                <td>90</td>
            </tr>
            <tr>
                <td rowspan="2">2</td>
                <td rowspan="2">Jai sree</td>
                <td>Maths</td>
                <td>92</td>
            </tr>
            <tr>
                <td>Science</td>
                <td>88</td>
            </tr>
    </table>
</body>
</html>
